name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Pin npm to v10
        run: npm install --global npm@10.9.2

      - name: Install dependencies
        run: npm ci

      - name: Run linter (via production build checks)
        run: npm run build
        env:
          CI: true

      - name: Run tests
        run: npm run test:ci
        env:
          CI: true
          NODE_ENV: test

  deploy:
    name: Deploy to Render
    needs: test
    if: github.ref == 'refs/heads/main' && success()
    runs-on: ubuntu-latest

    steps:
      - name: Skip deploy when Render hook is missing
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "RENDER_DEPLOY_HOOK_URL secret is not set. Skipping deployment."

      - name: Trigger Render Deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --silent --show-error -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Wait for deployment
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: sleep 30

      - name: Check deployment status
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          echo "Deployment triggered! Check status at:"
          echo "https://dashboard.render.com/web/${{ secrets.RENDER_SERVICE_ID }}"
