services:
  # Main web service
  - type: web
    name: jobtrackr-app
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jobtrackr-db
          property: connectionString

databases:
  # PostgreSQL database
  - name: jobtrackr-db
    plan: free
    region: oregon
    databaseName: jobtrackr
    ipAllowList: []